<!-- ===== CONTACT FORM ===== -->
<section>
  <div class="container">
    <div class="contact-wrap reveal">
      <div class="contact-info">
        <div class="info-block">
          <h4 data-en="Company Address:" data-zh="公司地址：">Company Address:</h4>
          <p data-en="G/F &amp; M/F," data-zh="地下及閣樓，">G/F &amp; M/F,</p>
          <p data-en="Kai Kwong Commercial Building," data-zh="啟光商業大廈，">Kai Kwong Commercial Building,</p>
          <p data-en="332 Lockhart Road," data-zh="駱克道332號，">332 Lockhart Road,</p>
          <p data-en="Wanchai, Hong Kong" data-zh="香港灣仔">Wanchai, Hong Kong</p>
        </div>
        <div class="info-block">
          <h4 data-en="Social Media:" data-zh="社交媒體：">Social Media:</h4>
          <div class="info-socials">
            <a href="#" target="_blank" aria-label="YouTube"><svg viewBox="0 0 24 24"><rect x="2.5" y="6" width="19" height="12" rx="3"/><path d="M10.5 9.2l4.2 2.8-4.2 2.8z" fill="var(--text)" stroke="none"/></svg></a>
            <a href="#" target="_blank" aria-label="Facebook"><svg viewBox="0 0 24 24"><path d="M14.5 8.5h2V5.6h-2.3c-2 0-3.2 1.2-3.2 3.3v1.6H9v2.9h2v6.6h3v-6.6h2.2l.4-2.9h-2.6V9.2c0-.5.2-.7.7-.7z" fill="var(--text)" stroke="none"/></svg></a>
            <a href="#" target="_blank" aria-label="Instagram"><svg viewBox="0 0 24 24"><rect x="3.5" y="3.5" width="17" height="17" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17" cy="7" r="1.1" fill="var(--text)" stroke="none"/></svg></a>
          </div>
        </div>
        <div class="info-block">
          <h4 data-en="General Enquiries" data-zh="一般查詢">General Enquiries</h4>
          <p><span data-en="Email." data-zh="電郵：">Email.</span> <a href="mailto:Info@Joy.co">Info@Joy.co</a></p>
          <p><span data-en="WhatsApp" data-zh="WhatsApp：">WhatsApp</span> <a href="https://wa.me/85290159333" target="_blank">+852 9015 9333</a></p>
        </div>
      </div>
      <form class="contact-form" id="contactForm">
        <div class="field"><label data-en="Name" data-zh="姓名">Name</label><input type="text" name="name" required></div>
        <div class="field"><label data-en="Contact Number" data-zh="聯絡電話">Contact Number</label><input type="text" name="phone"></div>
        <div class="field"><label data-en="Contact Email" data-zh="電郵">Contact Email</label><input type="email" name="email"></div>
        <div class="field"><label data-en="Enquiries Detail" data-zh="查詢內容">Enquiries Detail</label><textarea name="detail"></textarea></div>
        <button type="submit" class="btn" data-en="Submit" data-zh="提交">Submit</button>
      </form>
    </div>
  </div>
</section>
